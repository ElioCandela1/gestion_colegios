<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/reset.css}">
    <link rel="stylesheet" th:href="@{/style.css}">

    <title>Inicio de Sesión</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #00295A;
            padding: 25px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            color: #fff;
            height: 45vh;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 7px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border-radius: 5px;
            border: none;
        }

        label {
            font-size: 14px;
        }

        button {
            width: 30%;
            padding: 10px;
            cursor: pointer;
            border-radius: 50px;
            background-color: #33C52E;
            color: white;
            border: none;
            display: block;
            margin: 0 auto;

        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Iniciar Sesión</h2>

        <form action="/auth/login" method="post">
            <label>Usuario</label>

            <input type="text" name="username" required>

            <label>Contraseña</label>
            <input type="password" name="password" required>

            <button type="submit">Ingresar</button>
        </form>

        <div th:if="${error}" class="alert alert-danger">
            <p th:text="${error}"></p>
        </div>
    </div>

</body>

</html>
